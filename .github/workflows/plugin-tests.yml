# Plugin tests — runs on every push and PR.
#
# Two layers (both invoked via `just test`):
#   1. Python unit tests for plugins/myst-mermaid/plugin.py
#      (verifies AST transform shape, config merging, dual-render, etc.)
#   2. mermaid-cli integration tests that feed the plugin's output
#      through @mermaid-js/mermaid-cli (mmdc) and assert the rendered
#      SVG is valid. Catches the case where the plugin emits a config
#      mermaid.js itself rejects.
#
# Same `just` commands run locally — see Justfile in the repo root.

name: Plugin tests

on:
  push:
    paths:
      - "plugins/**"
      - "Justfile"
      - "requirements.txt"
      - ".github/workflows/plugin-tests.yml"
  pull_request:
    paths:
      - "plugins/**"
      - "Justfile"
      - "requirements.txt"
      - ".github/workflows/plugin-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3

      - name: Run unit tests (just test-python)
        run: just test-python

  mermaid-cli-integration:
    name: mermaid-cli SVG render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3

      - name: Run integration tests (just test-mmdc + smoke)
        run: |
          just test-mmdc-smoke
          just test-mmdc
