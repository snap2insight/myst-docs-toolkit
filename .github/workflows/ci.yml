# Plugin tests — runs on every push and PR.
#
# Two layers (both invoked via `just test`):
#   1. Python unit tests for plugins/myst-mermaid/plugin.py
#      (verifies AST transform shape, config merging, dual-render, etc.)
#   2. mermaid-cli integration tests that feed the plugin's output
#      through @mermaid-js/mermaid-cli (mmdc) and assert the rendered
#      SVG is valid. Catches the case where the plugin emits a config
#      mermaid.js itself rejects.
#
# Same `just` commands run locally — see Justfile in the repo root.

name: CI

on:
  push:
    paths:
      - "plugins/**"
      - "Justfile"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "plugins/**"
      - "Justfile"
      - "requirements.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Install npm globals into a path we can cache (default /usr/local is
  # shared and not safe to cache wholesale).
  NPM_CONFIG_PREFIX: /home/runner/.npm-global

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Run unit tests (just test-python)
        run: just test-python

  mermaid-cli-integration:
    name: mermaid-cli SVG render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
      - uses: extractions/setup-just@v3

      - name: Configure npm prefix + PATH
        # setup-node@v5 writes an .npmrc that overrides our NPM_CONFIG_PREFIX
        # env var, causing `npm install -g` to ignore it and write to
        # /usr/local/ instead. Forcibly set the prefix here so installs +
        # cache restores target the same directory.
        run: |
          mkdir -p "$NPM_CONFIG_PREFIX/bin"
          npm config set prefix "$NPM_CONFIG_PREFIX"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"

      # ── Caches (mermaid-cli job only) ─────────────────────────────────
      #   1) Python venv      — invalidated by requirements.txt
      #   2) npm globals + tarballs — invalidated by Justfile
      #   3) puppeteer Chrome — by far the biggest download in this job

      - name: Cache Python venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Cache npm globals + tarball cache
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/.npm-global
            /home/runner/.npm
          # Scoped per-workflow ("ci") because docs.yml installs different
          # global packages (mystmd, not mmdc). Sharing a single key
          # produces a `Failed to save: Unable to reserve cache with
          # key … another job may be creating this cache` collision when
          # both workflows run on the same push, leaving one workflow
          # with a partial cache from the other workflow's job.
          key: ${{ runner.os }}-npm-ci-${{ hashFiles('Justfile') }}
          restore-keys: |
            ${{ runner.os }}-npm-ci-

      - name: Cache puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-chrome
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Run integration tests (just test-mmdc + smoke)
        run: |
          just test-mmdc-smoke
          just test-mmdc
