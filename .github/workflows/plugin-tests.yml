# Plugin tests — runs on every push and PR.
#
# Two layers:
#   1. Python unit tests for plugins/myst-mermaid/plugin.py
#      (verifies AST transform shape, config merging, dual-render, etc.)
#   2. mermaid-cli integration tests that feed the plugin's output
#      through @mermaid-js/mermaid-cli (mmdc) and assert the rendered
#      SVG is valid. Catches the case where the plugin emits a config
#      mermaid.js itself rejects.

name: Plugin tests

on:
  push:
    paths:
      - "plugins/**"
      - ".github/workflows/plugin-tests.yml"
  pull_request:
    paths:
      - "plugins/**"
      - ".github/workflows/plugin-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install plugin runtime + test deps
        run: pip install pyyaml jsonschema pytest

      - name: Run unit tests
        run: pytest plugins/myst-mermaid/tests/test_plugin.py -v

  mermaid-cli-integration:
    name: mermaid-cli SVG render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mermaid-cli + matching Chrome
        run: |
          npm install -g @mermaid-js/mermaid-cli
          # mmdc uses puppeteer-core, which expects a specific Chrome
          # version. Resolve and install that version from inside the
          # installed package so it matches.
          MMDC_DIR="$(npm root -g)/@mermaid-js/mermaid-cli"
          (cd "$MMDC_DIR" && npx --yes puppeteer browsers install chrome-headless-shell)

      - name: Install Python deps
        run: pip install pyyaml jsonschema pytest

      - name: Smoke-test mmdc
        run: |
          echo "graph LR; A --> B" > /tmp/smoke.mmd
          mmdc -i /tmp/smoke.mmd -o /tmp/smoke.svg --quiet
          test -s /tmp/smoke.svg && echo "✅ mmdc renders cleanly"

      - name: Run integration tests
        run: pytest plugins/myst-mermaid/tests/test_mermaid_cli.py -v
